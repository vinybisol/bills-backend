name: CI/CD

# Single pipeline so deploy is strictly sequenced after build/test.
#
# Triggers:
#   - pull_request -> runs only build-and-test (deploy is gated off PRs)
#   - push develop -> build-and-test, then deploy (needs) -> Azure Web App (F1)
#   - push main    -> build-and-test only
#
# Required GitHub configuration for the deploy job (set before the first run):
#   - Variable  AZURE_WEBAPP_NAME            -> the Azure Web App name
#   - Secret    AZURE_WEBAPP_PUBLISH_PROFILE -> the app's publish profile XML
#   - Secret    NEON_CONNECTION_STRING       -> Neon connection string used to apply
#                                               migrations from the pipeline (read by the
#                                               AppDbContextFactory design-time factory)
#
# Runtime configuration (set in the Azure Web App, not here):
#   - ConnectionStrings__Neon  -> Neon pooler connection string (SSL Mode=Require)
#   - Firebase__ProjectId      -> Firebase project id
# Database migrations are applied by the deploy job (dotnet ef database update), before
# the app is published/deployed, not automatically on application startup.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
# CONFIGURATION
# For help, go to https://github.com/Azure/Actions
#
# 1. Set up the following secrets in your repository:
#   AZURE_WEBAPP_PUBLISH_PROFILE
#
# 2. Change these variables for your configuration:   
env:
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x'             # set this to the dot net version to use

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Integration tests run against a disposable PostgreSQL service container instead of
    # Neon: it runs inside the runner (no extra billing, no external secret) and removes
    # the network latency that made the Neon-backed suite slow.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bills_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bills_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore BillsBackend.slnx

      - name: Build
        run: dotnet build BillsBackend.slnx --configuration Release --no-restore

      - name: Run TestCommon
        run: dotnet test --project tests/UnitTests/TestCommon/TestCommon.csproj -c Release -- --coverage --coverage-output-format cobertura --coverage-output "$GITHUB_WORKSPACE/TestResults/Common/coverage.cobertura.xml"
        
      - name: Run Application.Tests
        run: dotnet test --project tests/UnitTests/Application.Tests/Application.Tests.csproj -c Release -- --coverage --coverage-output-format cobertura --coverage-output "$GITHUB_WORKSPACE/TestResults/Application/coverage.cobertura.xml"
        
      - name: Run BillsBackend.UnitTests
        run: dotnet test --project tests/BillsBackend.UnitTests/BillsBackend.UnitTests.csproj -c Release -- --coverage --coverage-output-format cobertura --coverage-output "$GITHUB_WORKSPACE/TestResults/Unit/coverage.cobertura.xml"

      - name: Run BillsBackend.IntegrationTests
        run: dotnet test --project tests/BillsBackend.IntegrationTests/BillsBackend.IntegrationTests.csproj -c Release -- --coverage --coverage-output-format cobertura --coverage-output "$GITHUB_WORKSPACE/TestResults/Integration/coverage.cobertura.xml"
        env:
          # Key-value form (not a postgresql:// URI) so NeonConnectionString.Normalize
          # leaves it untouched and does not force SSL Mode=Require on the local server.
          ConnectionStrings__NeonTest: "Host=localhost;Port=5432;Database=bills_test;Username=postgres;Password=postgres"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        run: |
          reportgenerator \
            -reports:"$GITHUB_WORKSPACE/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"$GITHUB_WORKSPACE/CoverageReport" \
            -reporttypes:"Html;Cobertura;TextSummary"

      - name: Enforce minimum coverage (80%)
        run: |
          LINE_COVERAGE=$(grep -oP '(?<=Line coverage: )[0-9]+(\.[0-9]+)?' "$GITHUB_WORKSPACE/CoverageReport/Summary.txt")
          echo "Line coverage: $LINE_COVERAGE%"
          if (( $(echo "$LINE_COVERAGE < 80" | bc -l) )); then
            echo "::error::Code coverage $LINE_COVERAGE% is below the required 80% threshold."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ github.workspace }}/CoverageReport

  deploy:
    name: Deploy to Azure (F1)
    runs-on: ubuntu-latest
    environment: development
    # Run only after CI passes, and only on a merge into develop (never on PRs or main).
    needs: build-and-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore BillsBackend.slnx

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # Applies pending migrations against Neon before the new app code is deployed, using
      # the design-time AppDbContextFactory (reads NEON_CONNECTION_STRING). Runs before
      # publish/deploy so the schema is ready by the time the new code starts serving.
      - name: Apply database migrations
        run: dotnet ef database update --project src/Data/Data.csproj
        env:
          NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish src/Api/Api.csproj -c Release -r linux-x64 --self-contained true -p:PublishReadyToRun=true -o '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/bill-api'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/bill-api'
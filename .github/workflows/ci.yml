name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BillsBackend.slnx

      - name: Build
        run: dotnet build BillsBackend.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BillsBackend.slnx --configuration Release --no-build --verbosity normal

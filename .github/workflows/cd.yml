name: CD

# Deploys to the Azure Web App (F1) on every merge into develop.
#
# Required GitHub configuration (set these before the first run):
#   - Variable  AZURE_WEBAPP_NAME            -> the Azure Web App name
#   - Secret    AZURE_WEBAPP_PUBLISH_PROFILE -> the app's publish profile XML
#
# Runtime configuration (set in the Azure Web App, not here):
#   - ConnectionStrings__Neon  -> Neon pooler connection string (SSL Mode=Require)
#   - Firebase__ProjectId      -> Firebase project id
# Database migrations are applied automatically on application startup.

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy to Azure (F1)
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish src/BillsBackend.Api/BillsBackend.Api.csproj -c Release -r win-x86 --self-contained true -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
